name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache: true

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Build
        run: go build -o ./bin/arkiv-storaged ./cmd/arkiv-storaged

      - name: Test
        run: go test ./...
